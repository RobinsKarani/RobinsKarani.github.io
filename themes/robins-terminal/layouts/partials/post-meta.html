<div class="post-meta">
  <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>

  {{ if .Params.tags }}
  <span class="meta-sep">|</span>
  <div class="post-tags">
    {{ range .Params.tags }}
    <a class="tag" href="{{ "/tags/" | relURL }}{{ . | urlize }}/">#{{ . }}</a>
    {{ end }}
  </div>
  {{ end }}

  {{ if gt .WordCount 0 }}
  <span class="meta-sep">|</span>
  <span class="read-time">~{{ div .WordCount 200 | add 1 }} min read</span>
  {{ end }}
</div>
