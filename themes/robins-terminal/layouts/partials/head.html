<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta name="author" content="{{ .Site.Params.author }}" />

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }} // {{ .Site.Title }}" />
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
{{ with .Params.cover }}<meta property="og:image" content="{{ . | absURL }}" />{{ end }}

<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} // {{ .Site.Title }}{{ end }}</title>

{{ $favVersion := .Site.Params.faviconVersion | default "1" }}
<link rel="icon" type="image/png" sizes="32x32" href='{{ printf "%s?v=%s" ("favicon.png" | relURL) $favVersion }}' />
<link rel="shortcut icon" type="image/png" href='{{ printf "%s?v=%s" ("favicon.png" | relURL) $favVersion }}' />
<link rel="apple-touch-icon" href='{{ printf "%s?v=%s" ("favicon.png" | relURL) $favVersion }}' />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<!-- Theme CSS -->
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}" />

<!-- Syntax Highlighting (Hugo built-in) -->
{{ if .Site.Params.syntaxHighlight }}
<link rel="stylesheet" href="{{ "css/syntax.css" | relURL }}" />
{{ end }}

<!-- Theme init: restore saved theme before paint to avoid flash -->
<script>
  (function() {
    var t = localStorage.getItem('rk-theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
